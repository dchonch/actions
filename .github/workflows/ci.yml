---
# Self-validation: lint the workflows in this repo.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-yaml:
    name: Lint workflows (yamllint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint workflow files
        run: yamllint -d relaxed .github/workflows/

  security:
    uses: dchonch/actions/.github/workflows/security.yml@main
    permissions:
      contents: read
      pull-requests: read
