---
# Reusable awesome list linting workflow.
# Validates that a list follows the awesome list spec (badge, TOC,
# description format, etc.) using the official awesome-lint tool.
#
# Call from any repo:
#
#   jobs:
#     lint-awesome:
#       uses: dchonch/actions/.github/workflows/lint-awesome.yml@main
#       permissions:
#         contents: read

name: Lint Awesome list

on:
  workflow_call:

jobs:
  awesome-lint:
    name: awesome-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "lts/*"

      - name: Run awesome-lint
        run: npx awesome-lint
