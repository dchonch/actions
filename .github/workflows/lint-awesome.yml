---
# Reusable awesome list linting workflow.
# Validates that a list follows the awesome list spec (badge, TOC,
# description format, etc.) using the official awesome-lint tool.
#
# Call from any repo:
#
#   jobs:
#     lint-awesome:
#       uses: dchonch/actions/.github/workflows/lint-awesome.yml@main
#       permissions:
#         contents: read

name: Lint Awesome list

on:
  workflow_call:

jobs:
  awesome-lint:
    name: awesome-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "lts/*"

      - name: Run awesome-lint
        run: npx awesome-lint
