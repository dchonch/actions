---
# Reusable security scanning workflow.
# Call from any repo:
#
#   jobs:
#     security:
#       uses: dchonch/actions/.github/workflows/security.yml@main
#       permissions:
#         contents: read
#         pull-requests: read
#
# To honour a .trivyignore file in the calling repo:
#
#   jobs:
#     security:
#       uses: dchonch/actions/.github/workflows/security.yml@main
#       with:
#         trivyignore: true
#       permissions:
#         contents: read
#         pull-requests: read

name: Security scanning

on:
  workflow_call:
    inputs:
      trivyignore:
        description: "Honour a .trivyignore file in the calling repo"
        type: boolean
        default: false

jobs:
  gitleaks:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Filesystem scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          scanners: secret,misconfig
          trivyignores: ${{ inputs.trivyignore && '.trivyignore' || '' }}
